name: daibao-dashboard CI/CD

# ==================== 触发机制说明 ====================
#
# push 分支          → 触发 CI（只读：build 校验）
# workflow_dispatch  → 触发 CD（构建镜像、部署服务器）
#
# 完整操作流程：
#   1. push 代码 → CI 自动运行
#   2. 准备测试：GitHub Actions → Run workflow → event=deploy-dev
#      → 构建镜像（DEPLOY_ENV=test），部署到 6001 端口
#   3. 测试通过：git tag v1.0.0 && git push origin v1.0.0
#   4. 上线：GitHub Actions → Run workflow → event=deploy-prod，tag=v1.0.0
#      → 给测试 sha 镜像追加语义化 tag（一次构建原则），部署到 6000 端口

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      event:
        description: '选择操作类型'
        required: true
        type: choice
        options:
          - deploy-dev
          - deploy-prod
      tag:
        description: '生产部署时填写，对应测试验证过的 tag，如 v1.0.0'
        required: false
        type: string

jobs:
  # ==================== CI：构建校验 ====================
  ci:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node 版本
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建校验
        run: npm run build

  # ==================== CD：测试环境部署 ====================
  deploy-dev:
    needs: ci
    if: github.event_name == 'workflow_dispatch' && inputs.event == 'deploy-dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 生成镜像标签
        id: meta
        run: echo "IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/daibao-dashboard:${{ steps.meta.outputs.IMAGE_TAG }}
          build-args: DEPLOY_ENV=test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 触发 infra 仓库部署
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          # TODO: infra 迁移到 daibaoTool org 后，改回动态写法：
          # repository: ${{ github.repository_owner }}/infra
          repository: q1875759084/infra
          event-type: deploy-daibao-dashboard
          client-payload: |
            {
              "image_tag": "${{ steps.meta.outputs.IMAGE_TAG }}",
              "environment": "dev"
            }

  # ==================== CD：生产环境部署 ====================
  deploy-prod:
    needs: ci
    if: github.event_name == 'workflow_dispatch' && inputs.event == 'deploy-prod'
    runs-on: ubuntu-latest

    steps:
      - name: 校验 tag 参数不能为空
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            echo "❌ 生产部署必须填写 tag 参数，如 v1.0.0"
            exit 1
          fi

      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: 获取 sha tag
        id: meta
        run: echo "SHA_TAG=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 给 sha 镜像追加语义化版本 tag
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/daibao-dashboard:${{ inputs.tag }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/daibao-dashboard:${{ steps.meta.outputs.SHA_TAG }}

      - name: 触发 infra 仓库部署
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          # TODO: infra 迁移到 daibaoTool org 后，改回动态写法：
          # repository: ${{ github.repository_owner }}/infra
          repository: q1875759084/infra
          event-type: deploy-daibao-dashboard
          client-payload: |
            {
              "image_tag": "${{ inputs.tag }}",
              "environment": "prod"
            }
