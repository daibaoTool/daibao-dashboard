server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ==================== 反向代理：CoWatch-backend Admin API ====================
    #
    # COWATCH_BACKEND_URL 由 infra 仓库的 docker-compose 注入：
    #   测试环境：http://host-gateway:8001（cowatch-backend 测试实例，127.0.0.1 绑定）
    #   生产环境：http://host-gateway:8000（cowatch-backend 生产实例，127.0.0.1 绑定）
    #
    # nginx 镜像启动时通过 envsubst 将占位符替换为实际值（见 Dockerfile）
    #
    location /api/ {
        proxy_pass ${COWATCH_BACKEND_URL};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ==================== 反向代理：monitor-backend ====================
    #
    # MONITOR_BACKEND_URL 由 infra 仓库的 docker-compose 注入：
    #   测试环境：http://host-gateway:3101
    #   生产环境：http://host-gateway:3100
    #
    location /monitor-api/ {
        proxy_pass ${MONITOR_BACKEND_URL};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ==================== SPA 路由兜底 ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== 静态资源：长期强缓存 ====================
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ==================== index.html：协商缓存 ====================
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
